name: sacostay
description: SacoStay — Tìm bạn ở ghép hợp gu
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.4
  google_fonts: ^6.2.1
  intl: ^0.20.2
  url_launcher: ^6.3.1
  webview_flutter: ^4.10.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  signalr_netcore: ^1.4.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  image: ^4.5.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: image/app_icon.png
  # Android 8+ uses adaptive icons; without this the launcher shrinks legacy icons.
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: image/app_icon.png
  adaptive_icon_foreground_inset: 0
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"
  web:
    generate: true
    image_path: image/app_icon.png
    background_color: "#FFFFFF"
    theme_color: "#FF9F43"

flutter:
  uses-material-design: true
  assets:
    - image/
    - image/Icon/
